<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
{% if page.hero_image %}
<link rel="preload" as="image" href="{{ page.hero_image | relative_url }}">
{% endif %}

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Poppins:wght@600;700;900&display=swap"
    rel="stylesheet">

<!-- Nexus Design System -->
<style>
    {
        % include critical-css.html %
    }
</style>

<link rel="stylesheet" href="{{ '/assets/css/nexus.css' | relative_url }}?v={{ site.time | date: '%s' }}" media="print"
    onload="this.media='all'">
<noscript>
    <link rel="stylesheet" href="{{ '/assets/css/nexus.css' | relative_url }}?v={{ site.time | date: '%s' }}">
</noscript>

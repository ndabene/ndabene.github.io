<div class="nexus-code-block" data-lang="{{ include.lang }}">
    <div class="nexus-code-block__header">
        <span class="nexus-code-block__filename">{{ include.filename | default: include.lang }}</span>
        <button class="nexus-code-block__copy" aria-label="Copy to clipboard">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span>Copier</span>
        </button>
    </div>
    <div class="nexus-code-block__content">
        {% highlight {{ include.lang }} %}
        {{ include.code }}
        {% endhighlight %}
    </div>
</div>

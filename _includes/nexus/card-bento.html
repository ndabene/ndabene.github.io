<article class="nexus-card" data-category="{{ include.post.categories | first | slugify }}"
    data-tags="{{ include.post.tags | join: ',' | slugify }}">
    {% if include.post.image %}
    <div class="nexus-card__image-container">
        <img src="{{ include.post.image | relative_url }}" alt="{{ include.post.title }}" class="nexus-card__image"
            loading="lazy">
    </div>
    {% endif %}
    <div class="nexus-card__content">
        <h3 class="nexus-card__title">
            <a href="{{ include.post.url | relative_url }}">{{ include.post.title }}</a>
        </h3>
        <div class="nexus-card__meta" style="font-size: 0.85rem; color: var(--color-text-dim); margin-bottom: 0.5rem;">
            <time datetime="{{ include.post.date | date_to_xmlschema }}">{{ include.post.date | date: "%d %b %Y"
                }}</time>
            {% if include.post.tags.size > 0 %}
            <span>• {{ include.post.tags | first }}</span>
            {% endif %}
        </div>
        <p class="nexus-card__excerpt">
            {{ include.post.excerpt | strip_html | truncatewords: 20 }}
        </p>
    </div>
</article>

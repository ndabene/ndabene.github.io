---
layout: default
---

<article class="post-layout section-padding">
    <div class="nexus-container">
        <!-- Header -->
        <header class="post-header mb-lg">
            <nav class="breadcrumb">
                <a href="/blog/">Blog</a>
                <span>{{ page.title }}</span>
            </nav>
            <h1 class="post-title">{{ page.title }}</h1>
            <div class="post-meta">
                <time datetime="{{ page.date | date_to_xmlschema }}">
                    {{ page.date | date: "%d %B %Y" }}
                </time>
                {% if page.author %}
                <span class="post-author">• {{ page.author }}</span>
                {% endif %}
                {% if page.read_time_minutes %}
                <span class="post-read-time">• {{ page.read_time_minutes }} min de lecture</span>
                {% endif %}
            </div>
        </header>

        <!-- Content -->
        <div class="nexus-reading-container">
            <div class="nexus-prose">
                {{ content }}
            </div>
        </div>

        <!-- Footer -->
        <footer class="post-footer mt-lg">
            <a href="/blog/" class="nexus-btn nexus-btn--glass">← Retour au Blog</a>
        </footer>
    </div>
</article>

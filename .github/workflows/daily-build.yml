name: Daily Build - Publication automatique des articles futurs

# Déclencheurs
on:
  # Build quotidien à 0h UTC (1h Paris en hiver, 2h Paris en été)
  schedule:
    - cron: '0 0 * * *'
  
  # Déclenchement manuel via GitHub UI
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Forcer le build même sans changements'
        required: false
        default: false
        type: boolean

# Permissions nécessaires pour GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul job à la fois pour éviter les conflits
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Historique complet pour Jekyll
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Ensure config flags
        run: |
          printf "\nfuture: true\n" >> _config.yml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Harmonize tags
        run: |
          echo "🏷️  Harmonisation automatique des tags..."
          python3 scripts/harmonize_tags.py --apply
          echo "✅ Tags harmonisés avec succès"

      - name: Generate tag pages
        run: |
          echo "🚀 Génération automatique des pages de tags..."
          ruby scripts/generate_tag_pages.rb
          echo "✅ Pages de tags générées avec succès"

      - name: Setup Node.js for WebP generation
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: |
          echo "📦 Installation des dépendances npm (sharp)..."
          npm install
          echo "✅ Dépendances npm installées avec succès"

      - name: Generate WebP images with sharp
        run: |
          echo "🖼️  Génération des images WebP avec sharp (plus rapide et robuste)..."
          npm run generate:webp
          echo ""
          echo "📊 Vérification des fichiers générés..."
          find assets/images/blog -name "*.webp" -type f | wc -l
          echo "✅ Images WebP générées avec succès"

      - name: Install ImageMagick for responsive images
        run: |
          echo "📦 Installation d'ImageMagick pour images responsive..."
          sudo apt-get install -y imagemagick
          convert -version
          echo "✅ ImageMagick installé avec succès"

      - name: Generate responsive images
        run: |
          echo "🖼️  Génération des images responsive (480px, 720px, 1080px)..."
          bash scripts/generate-responsive-images.sh
          echo ""
          echo "📊 Vérification des variants responsive générés..."
          echo "   - Variants 480px: $(find assets/images/blog -name "*-480.webp" -type f | wc -l)"
          echo "   - Variants 720px: $(find assets/images/blog -name "*-720.webp" -type f | wc -l)"
          echo "   - Variants 1080px: $(find assets/images/blog -name "*-1080.webp" -type f | wc -l)"
          echo "✅ Images responsive générées avec succès"

      - name: Check for future posts
        id: check_posts
        run: |
          # Vérifier s'il y a des articles futurs qui peuvent maintenant être publiés
          current_date=$(date -u +"%Y-%m-%d")
          future_posts=$(find _posts _posts_en -name "*.md" -exec grep -l "date: $current_date\|date: $(date -u -d "yesterday" +"%Y-%m-%d")\|date: $(date -u -d "2 days ago" +"%Y-%m-%d")" {} \; 2>/dev/null | wc -l)

          echo "Articles potentiellement publiables: $future_posts"
          echo "current_date=$current_date" >> $GITHUB_OUTPUT
          echo "future_posts=$future_posts" >> $GITHUB_OUTPUT

          # Lister les articles concernés pour debug
          echo "=== Articles avec dates récentes ==="
          find _posts _posts_en -name "*.md" -exec grep -l "date: $current_date\|date: $(date -u -d "yesterday" +"%Y-%m-%d")\|date: $(date -u -d "2 days ago" +"%Y-%m-%d")" {} \; 2>/dev/null || echo "Aucun article trouvé"
      
      - name: Build with Jekyll
        run: |
          echo "🏗️ Building Jekyll site with future posts enabled..."
          echo "Date actuelle: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          BASE_PATH="${{ steps.pages.outputs.base_path }}"
          if [ -n "$BASE_PATH" ]; then
            bundle exec jekyll build --config _config.yml,_config_github.yml --future --verbose --baseurl "$BASE_PATH"
          else
            bundle exec jekyll build --config _config.yml,_config_github.yml --future --verbose
          fi
          echo "✅ Build terminé"
          ls -la _site/
        env:
          JEKYLL_ENV: production

      # ========================================
      # PAGEFIND SEARCH INDEX
      # ========================================
      - name: Install Pagefind
        run: |
          echo "📦 Installation de Pagefind..."
          npm install -g pagefind
          echo "✅ Pagefind installé"

      - name: Build Pagefind index
        run: |
          echo "🔍 Génération de l'index de recherche Pagefind..."
          npx pagefind --site _site \
            --output-path _site/pagefind \
            --glob "**/*.html" \
            --exclude-selectors ".social-sharing-section, nav, footer, .breadcrumb, .reading-progress" \
            --force-language "multi" \
            --keep-index-url \
            --verbose

          echo ""
          echo "📊 Statistiques Pagefind:"
          echo "   - Fichiers HTML: $(find _site -name '*.html' -type f | wc -l)"
          echo "   - Fichiers index: $(find _site/pagefind -name '*.pf_*' -type f 2>/dev/null | wc -l)"
          if [ -f "_site/pagefind/pagefind.js" ]; then
            echo "   ✅ Index principal généré"
          else
            echo "   ❌ Index principal manquant"
            exit 1
          fi
          echo "✅ Index Pagefind généré avec succès"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Summary
        run: |
          echo "## 📊 Résumé du build quotidien" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "- **Articles futurs détectés**: ${{ steps.check_posts.outputs.future_posts }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL du site**: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Déployé avec succès" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_posts.outputs.future_posts }}" -gt "0" ]; then
            echo "- **🎉 Nouveaux articles publiés automatiquement !**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **ℹ️ Aucun nouvel article à publier aujourd'hui**" >> $GITHUB_STEP_SUMMARY
          fi
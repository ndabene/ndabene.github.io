name: Build and deploy Jekyll site to GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4



      # ========================================
      # JEKYLL BUILD
      # ========================================
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Validate blog posts frontmatter
        run: |
          echo "🔍 Validation du frontmatter des articles..."
          ruby scripts/validate_frontmatter.rb
          echo "✅ Frontmatter validé avec succès"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Enable future posts for preview
        run: |
          printf "\nfuture: true\n" >> _config.yml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Harmonize tags
        run: |
          echo "🏷️  Harmonisation automatique des tags..."
          python3 scripts/harmonize_tags.py --apply
          echo "✅ Tags harmonisés avec succès"

      - name: Normalize tags for better filtering
        run: |
          echo "🔧 Normalisation des tags pour améliorer les filtres..."
          ruby scripts/normalize_tags.rb --apply
          echo "✅ Tags normalisés avec succès"

      - name: Generate tag pages
        run: |
          echo "🚀 Génération automatique des pages de tags..."
          ruby scripts/generate_tag_pages.rb
          echo "✅ Pages de tags générées avec succès"

      - name: Setup Node.js for WebP generation
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: |
          echo "📦 Installation des dépendances npm (sharp)..."
          npm install
          echo "✅ Dépendances npm installées avec succès"

      - name: Generate WebP images with sharp
        run: |
          echo "🖼️  Génération des images WebP avec sharp..."
          npm run generate:webp
          echo ""
          echo "📊 Vérification des fichiers WebP générés..."
          find assets/images -name "*.webp" -not -name "*-480.webp" -not -name "*-720.webp" -not -name "*-1080.webp" -type f | wc -l
          echo "✅ Images WebP générées avec succès"

      - name: Commit generated image variants
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/images/
          git diff --cached --quiet || git commit -m "chore(images): generate WebP responsive variants $(date -u +'%Y-%m-%d')"
          git push || echo "No variants to commit"

      - name: Generate WebP variants and AVIF with sharp
        run: |
          echo "🖼️  Génération des variants responsive (480/720/1080) et AVIF avec sharp..."
          npm run generate:variants
          echo ""
          echo "📊 Vérification des variants générés..."
          echo "   - Variants WebP 480px:  $(find assets/images -name '*-480.webp' -type f | wc -l)"
          echo "   - Variants WebP 720px:  $(find assets/images -name '*-720.webp' -type f | wc -l)"
          echo "   - Variants WebP 1080px: $(find assets/images -name '*-1080.webp' -type f | wc -l)"
          echo "   - Variants AVIF 480px:  $(find assets/images -name '*-480.avif' -type f | wc -l)"
          echo "   - Variants AVIF 720px:  $(find assets/images -name '*-720.avif' -type f | wc -l)"
          echo "   - Variants AVIF 1080px: $(find assets/images -name '*-1080.avif' -type f | wc -l)"
          echo "✅ Variants et AVIF générés avec succès"

      - name: Validate article images are complete
        run: |
          echo "🔍 Validation que toutes les images d'articles ont leurs variants WebP et AVIF..."
          ruby scripts/validate_images_complete.rb

      - name: Verify all images are complete before build
        run: |
          echo "🔍 Vérification que toutes les images WebP ont leurs variants AVIF..."
          missing=0
          while IFS= read -r webp; do
            base="${webp%.webp}"
            for size in 480 720 1080; do
              if [ -f "${base}-${size}.webp" ] && [ ! -f "${base}-${size}.avif" ]; then
                echo "   ❌ MANQUANT: ${base}-${size}.avif"
                missing=$((missing + 1))
              fi
            done
          done < <(find assets/images -name "*.webp" -not -name "*-480.webp" -not -name "*-720.webp" -not -name "*-1080.webp" -type f)
          if [ $missing -gt 0 ]; then
            echo "❌ $missing fichier(s) AVIF manquant(s) — build annulé pour éviter une MEP incomplète."
            exit 1
          fi
          echo "✅ Toutes les images sont complètes (WebP + AVIF)"

      - name: Build with Jekyll
        run: |
          BASE_PATH="${{ steps.pages.outputs.base_path }}"
          if [ -n "$BASE_PATH" ] && [ "$BASE_PATH" != "/" ]; then
            bundle exec jekyll build --trace --config _config.yml,_config_github.yml --baseurl "$BASE_PATH"
          else
            bundle exec jekyll build --trace --config _config.yml,_config_github.yml
          fi
        env:
          JEKYLL_ENV: production

      # ========================================
      # PAGEFIND SEARCH INDEX
      # ========================================
      - name: Install Pagefind
        run: |
          echo "📦 Installation de Pagefind pour l'indexation de recherche..."
          npm install -g pagefind
          echo "✅ Pagefind installé avec succès"

      - name: Build Pagefind index
        run: |
          echo "🔍 Génération de l'index de recherche Pagefind..."
          npx pagefind --site _site \
            --output-path _site/pagefind \
            --glob "**/*.html" \
            --exclude-selectors ".social-sharing-section, nav, footer, .breadcrumb, .reading-progress" \
            --force-language "multi" \
            --keep-index-url \
            --verbose

          echo ""
          echo "📊 Statistiques de l'indexation Pagefind:"
          echo "   - Fichiers HTML trouvés: $(find _site -name "*.html" -type f | wc -l)"
          echo "   - Articles FR trouvés: $(find _site/articles -name "*.html" -type f 2>/dev/null | wc -l)"
          echo "   - Articles EN trouvés: $(find _site/en/articles -name "*.html" -type f 2>/dev/null | wc -l)"
          echo "   - Fichiers index générés: $(find _site/pagefind -name "*.pf_*" -type f 2>/dev/null | wc -l)"
          echo "   - Taille totale de l'index: $(du -sh _site/pagefind 2>/dev/null | cut -f1 || echo 'N/A')"
          echo ""
          echo "📄 Échantillon des pages indexées FR:"
          find _site/articles -name "*.html" -type f 2>/dev/null | head -5 || echo "Aucun article FR trouvé"
          echo ""
          echo "📄 Échantillon des pages indexées EN:"
          find _site/en/articles -name "*.html" -type f 2>/dev/null | head -5 || echo "Aucun article EN trouvé"
          echo ""
          echo "🔍 Test de recherche dans l'index:"
          if [ -f "_site/pagefind/pagefind.js" ]; then
            echo "   ✅ Index principal généré"
          else
            echo "   ❌ Index principal manquant"
          fi
          echo ""
          echo "✅ Index Pagefind généré avec succès"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
